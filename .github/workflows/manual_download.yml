name: Run Strategic Asset Engine Data Update

on:
  schedule:
    # Menjalankan setiap hari Senin - Jumat pukul 09:00 UTC (17:00 WITA)
    - cron: '0 9 * * 1-5'
  push:
    branches: [ main ] # Ini akan berjalan otomatis setiap kali Anda update kode
  workflow_dispatch: # Agar bisa dijalankan manual untuk testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Izin krusial agar Action bisa melakukan Push
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas sqlalchemy pandas-ta matplotlib mplfinance requests numpy plotly

      - name: Run Data Downloader
        run: python download_data.py

      - name: Run Technical Analysis
        run: python analysis.py

      - name: Run Visual Notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MPLBACKEND: Agg # Menghindari error Matplotlib di server headless
        run: python notify.py

      - name: Commit and Push Database Update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Simpan perubahan lokal sementara agar 'pull' bisa berjalan bersih
          git stash
          
          # 2. Ambil update terbaru dari repositori
          git pull origin main --rebase
          
          # 3. Kembalikan file database yang tadi disimpan sementara
          git stash pop || echo "Tidak ada perubahan untuk dikembalikan"
          
          # 4. Tambahkan, commit, dan kirim
          git add database_investasi.db
          git commit -m "Auto-update: Ingestion, Analysis, & Anomaly Detection $(date)" || echo "No changes to commit"
          git push origin main          
