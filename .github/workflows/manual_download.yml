name: Saham Automation Pipeline

on:
  schedule:
    # Menjalankan otomatis setiap hari Senin-Jumat jam 17:00 WIB (10:00 UTC)
    - cron: '0 10 * * 1-5'
  workflow_dispatch: # Memungkinkan Anda menjalankan manual kapan saja

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas matplotlib sqlalchemy
        pip install matplotlib mplfinance

    - name: Run Automated Pipeline
      run: python main.py  # Cukup panggil file ini saja sekarang

    - name: Run Pipeline
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py  

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add database_investasi.db tren_saham.png
        git commit -m "Update data saham dan grafik harian [skip ci]" || echo "No changes to commit"
        git push
