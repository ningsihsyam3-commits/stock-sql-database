name: Saham Visual Analytics Pipeline

on:
  schedule:
    - cron: '0 9 * * 1-5' # Berjalan setiap Senin-Jumat jam 16:00 WIB (9:00 UTC)
  workflow_dispatch:      # Agar bisa dijalankan manual untuk testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas sqlalchemy pandas_ta matplotlib mplfinance requests

      - name: Run Data Downloader
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python download_data.py

      - name: Run Technical Analysis
        run: python analys.py

      - name: Run Visual Notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Menambahkan konfigurasi agar Matplotlib tidak error di server (Headless Mode)
          MPLBACKEND: Agg 
        run: python notify.py

      - name: Commit and Push Database Update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add database_investasi.db
          git commit -m "Update database: Harga, Volume, dan Indikator" || echo "No changes to commit"
          git push
